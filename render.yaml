services:
  - type: web
    name: aid-mcp-test-02
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py
    envVars:
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: LOG_LEVEL
        value: INFO
